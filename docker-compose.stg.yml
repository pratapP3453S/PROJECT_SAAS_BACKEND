services:

  migrator:
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"

  app:
    build:
      target: production
    container_name: ${APP_CONTAINER_NAME:-app_stg}
    restart: always
    env_file: .env
    environment:
      NODE_ENV: staging
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "${PORT:-5005}:5005"
    # Persistent named volume for uploads — survives container rebuilds.
    # Lives entirely inside Docker storage; no host coupling.
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres_stg}
    restart: always
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  redis:
    container_name: ${REDIS_CONTAINER_NAME:-redis_stg}
    restart: always
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
