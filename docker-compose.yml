name: ${COMPOSE_PROJECT_NAME:-nestjs-enterprise}

services:

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "node_modules/.bin/prisma migrate deploy"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    # Note: /app/uploads is mounted by environment-specific overrides:
    #   dev   → ./uploads     (bind mount, host-visible for live inspection)
    #   stg   → uploads_data  (named volume, persistent across container rebuilds)
    #   prod  → uploads_data  (same — production wants isolation, not host coupling)
    # Base intentionally leaves the path unmounted so each env owns its policy.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app_net

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-postgres_data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-redis_data}

networks:
  app_net:
    driver: bridge
